<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>i2Prompt 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <div class="brand">i2Prompt</div>
        <p>图片反推提示词配置</p>
      </div>
      <div class="top-actions">
        <button id="btnNew" class="btn ghost">新建配置</button>
        <button id="btnSaveAll" class="btn primary">保存</button>
      </div>
    </header>

    <section class="layout">
      <aside class="sidebar">
        <div class="section-title">模型配置</div>
        <div id="configList" class="config-list"></div>
      </aside>

      <section class="card">
        <div class="card-head">
          <div>
            <h1 id="formTitle">默认配置</h1>
            <p>API Key 只保存在本机浏览器扩展存储里。</p>
          </div>
          <button id="btnDelete" class="btn danger">删除</button>
        </div>

        <div class="grid compact">
          <label class="field">
            <span>配置名称</span>
            <input id="configName" type="text" placeholder="例如 ModelScope Qwen">
          </label>

          <label class="field">
            <span>供应商</span>
            <select id="providerSelect"></select>
          </label>

          <label class="field wide">
            <span>API Base</span>
            <input id="apiBase" type="url" placeholder="https://api.example.com/v1">
          </label>

          <label class="field wide">
            <span>API Key</span>
            <input id="apiKey" type="password" autocomplete="off" placeholder="填入你的 API Key">
          </label>

          <label class="field model-field">
            <span>模型</span>
            <div class="model-control">
              <input id="modelName" list="modelPresets" type="text" placeholder="模型标识">
              <button id="btnFetchModels" class="mini-btn" type="button">刷新模型</button>
            </div>
            <select id="modelList" class="model-list" hidden></select>
            <datalist id="modelPresets"></datalist>
          </label>

          <label class="field">
            <span>图片发送方式</span>
            <select id="imageMode">
              <option value="auto">自动</option>
              <option value="url-first">优先 URL</option>
              <option value="base64">Base64</option>
            </select>
          </label>

          <label class="field">
            <span>图片细节</span>
            <select id="detail">
              <option value="high">high</option>
              <option value="auto">auto</option>
              <option value="low">low</option>
            </select>
          </label>

          <label class="field">
            <span>最大输出</span>
            <input id="maxTokens" type="number" min="256" max="8192" step="256">
          </label>
        </div>

        <div class="divider"></div>

        <div class="settings-grid compact">
          <label class="field">
            <span>默认语言</span>
            <select id="defaultLanguage">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </label>

          <label class="field">
            <span>历史条数</span>
            <input id="historyLimit" type="number" min="5" max="100" step="5">
          </label>

          <div class="copy-group">
            <label class="check">
              <input id="autoCopy" type="checkbox">
              <span>反推成功后自动复制</span>
            </label>
            <label class="field copy-mode">
              <span>复制内容</span>
              <select id="copyMode">
                <option value="text">文字提示词</option>
                <option value="json">JSON</option>
                <option value="all">全部</option>
              </select>
            </label>
          </div>

          <label class="check">
            <input id="showQuota" type="checkbox">
            <span>ModelScope 显示模型剩余次数</span>
          </label>

          <label class="check disabled">
            <input id="screenshotEnabled" type="checkbox" disabled>
            <span>截图反推（预留，默认关闭）</span>
          </label>
        </div>

        <section class="prompt-card">
          <div class="prompt-head">
            <div>
              <h2>默认提示词</h2>
              <p>右键反推时会按默认语言使用对应模板。</p>
            </div>
            <div class="segmented">
              <button id="btnPromptZh" type="button" class="active">中文</button>
              <button id="btnPromptEn" type="button">English</button>
            </div>
          </div>
          <textarea id="promptZh" rows="8" spellcheck="false"></textarea>
          <textarea id="promptEn" rows="8" spellcheck="false" hidden></textarea>
        </section>

        <div class="status-row">
          <span id="statusText"></span>
        </div>
      </section>
    </section>
  </main>

  <script src="../shared/i2prompt-shared.js"></script>
  <script src="options.js"></script>
</body>
</html>
